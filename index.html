<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>顔一致率チェッカー</title>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

  <style>
    body{
      font-family:sans-serif;
      padding:20px;
    }

    img{
      max-width:200px;
      margin:10px;
    }

    #result{
      font-size:30px;
      margin-top:20px;
    }
  </style>
</head>
<body>

<h1>顔一致率チェッカー</h1>

<input type="file" id="img1">
<input type="file" id="img2">

<br><br>

<button onclick="compare()">比較</button>

<div>
  <img id="preview1">
  <img id="preview2">
</div>

<div id="result"></div>

<script>

async function loadModels(){
  await faceapi.nets.ssdMobilenetv1.loadFromUri('./models');
  await faceapi.nets.faceRecognitionNet.loadFromUri('./models');
  await faceapi.nets.faceLandmark68Net.loadFromUri('./models');
}

loadModels();

function loadImage(input, previewId){
  return new Promise(resolve => {

    const file = input.files[0];

    const img = document.getElementById(previewId);

    img.src = URL.createObjectURL(file);

    img.onload = () => resolve(img);
  });
}

async function getDescriptor(img){

  const detection = await faceapi
    .detectSingleFace(img)
    .withFaceLandmarks()
    .withFaceDescriptor();

  if(!detection){
    return null;
  }

  return detection.descriptor;
}

async function compare(){

  const img1 = await loadImage(
    document.getElementById("img1"),
    "preview1"
  );

  const img2 = await loadImage(
    document.getElementById("img2"),
    "preview2"
  );

  const desc1 = await getDescriptor(img1);
  const desc2 = await getDescriptor(img2);

  if(!desc1 || !desc2){
    alert("顔を検出できませんでした");
    return;
  }

  const distance = faceapi.euclideanDistance(desc1, desc2);

  const similarity = Math.max(
    0,
    Math.round((1 - distance) * 100)
  );

  document.getElementById("result").innerText =
    `一致率 ${similarity}%`;
}

</script>

</body>
</html>
